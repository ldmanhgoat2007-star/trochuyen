<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi ghi chú</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="icon" href="favicon.gif" type="image/gif?v=2">
</head>
<body>

    <header>
        <h1>Bảng Ghi Chú</h1>
        <p>Của Anh Với Em Bống <span id="change-name-btn" style="cursor: pointer; font-size: 0.8rem; color: #ff6b81; text-decoration: underline; margin-left: 10px;">(Đổi tên)</span></p>
    </header>

    <main id="notes-container">
        <div class="loading">Đang tải ghi chú...</div>
    </main>

<footer>
    <div style="text-align: center; margin-bottom: 20px;">
        <button id="toggle-form-btn" type="button" class="arrow-btn">
            <svg id="arrow-icon" class="arrow-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 15 12 9 18 15"></polyline>
            </svg>
        </button>
    </div>
    <form id="note-form" class="hidden">
        <div class="form-group">
            <textarea id="note-content" placeholder="Viết điều gì đó cho người kia..." required></textarea>
        </div>
        
        <div class="form-bottom-row">
        <div class="form-actions">
            <label for="note-image" class="custom-file-upload">
                <img src="https://img.icons8.com/material-outlined/24/ffffff/image.png" alt="Icon ảnh"/> Chèn ảnh
            </label>
            <input type="file" id="note-image" accept="image/*">
            <span id="file-name-display"></span>
        </div>

        <div class="color-picker">
            <label><input type="radio" name="note-color" value="#fff9c4"> <span style="background:#fff9c4"></span></label>
            <label><input type="radio" name="note-color" value="#ffcce6"> <span style="background:#ffcce6"></span></label>
            <label><input type="radio" name="note-color" value="#cce6ff"> <span style="background:#cce6ff"></span></label>
            <label><input type="radio" name="note-color" value="#e6ffcc" checked> <span style="background:#e6ffcc"></span></label>
        </div>

        <button type="submit" id="submit-btn">Gửi Ghi Chú</button>
    </div>

    </form>
</footer>

    <script type="module" src="app.js"></script>
</body>
</html>
