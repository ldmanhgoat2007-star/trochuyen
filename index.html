<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi ghi chú</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20">
    <link rel="icon" href="favicon.gif" type="image/gif">
</head>
<body>

    <button id="theme-toggle" style="position: fixed; right: 20px; top: 20px; background: none; border: none; font-size: 2rem; cursor: pointer; z-index: 2000;">🌙</button>

    <div class="web-wrapper">
        
        <div class="sidebar sidebar-left"></div>
        
        <div class="main-content">
            <header>
                <h1>Bảng Ghi Chú</h1>
                <p>Của Anh Với Em Bống</p>
            </header>

            <main id="notes-container">
                <div class="loading">Đang tải ghi chú...</div>
            </main>
        </div>
        
        <div class="sidebar sidebar-right"></div>
        
    </div>

    <footer>
        <div style="text-align: center; margin-bottom: 20px;">
            <button id="toggle-form-btn" type="button" class="arrow-btn">
                <svg id="arrow-icon" class="arrow-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 15 12 9 18 15"></polyline>
                </svg>
            </button>
        </div>
        
        <form id="note-form" class="hidden">
            <div class="form-group">
                <textarea id="note-content" placeholder="Viết điều gì đó cho người kia..." required></textarea>
            </div>
            
            <div class="form-bottom-row">
                <div class="form-actions">
    <label for="note-image" class="custom-file-upload">
        <img src="https://img.icons8.com/material-outlined/24/ffffff/image.png" alt="Icon ảnh"/> Chèn ảnh
    </label>
    <input type="file" id="note-image" accept="image/*">
    <span id="file-name-display"></span>

    <label id="music-toggle-btn" class="custom-file-upload music-btn">
    🎵 Chèn nhạc
    </label>

<input type="text" id="music-link-input" class="hidden" placeholder="Dán link bài hát vào đây..." />
</div>

<input type="text" id="music-link-input" class="hidden" placeholder="Dán link bài hát vào đây..." />

   <div class="color-picker">
    <label>
        <input type="radio" name="color" value="#4ddb81" checked> 
        <span style="background-color: #4ddb81;"></span>
    </label>
    
    <label>
        <input type="radio" name="color" value="#eb8897"> 
        <span style="background-color: #eb8897;"></span>
    </label>
    
    <label>
        <input type="radio" name="color" value="#60d1db"> 
        <span style="background-color: #60d1db;"></span>
    </label>
    
    <label>
        <input type="radio" name="color" value="#d6d678"> 
        <span style="background-color: #d6d678;"></span>
    </label>
   </div>

                <div class="submit-group">
                    <span id="change-name-btn">Đổi tên</span>
                    <button type="submit" id="submit-btn">Gửi Ghi Chú</button>
                </div>
            </div>
        </form>
    </footer>

    <script type="module" src="app.js?v=2"></script>
</body>
</html>
