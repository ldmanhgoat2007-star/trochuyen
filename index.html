<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABCXYZ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.gif" type="image/gif">
</head>
<body>

    <header>
        <h1>Our Secret Board</h1>
        <p>Hellooo.</p>
    </header>

    <main id="notes-container">
        <div class="loading">Đang tải những kỷ niệm...</div>
    </main>

    <footer>
        <form id="note-form">
            <div class="form-group">
                <textarea id="note-content" placeholder="Viết điều gì đó cho người kia..." required></textarea>
            </div>
            <div class="form-actions">
                <label for="note-image" class="custom-file-upload">
                    <img src="https://img.icons8.com/material-outlined/24/ffffff/image.png" alt="Icon ảnh"/>
                    Chèn ảnh
                </label>
                <input type="file" id="note-image" accept="image/*">
                
                <span id="file-name-display"></span>

                <button type="submit" id="submit-btn">Gửi Ghi Chú</button>
            </div>
        </form>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
